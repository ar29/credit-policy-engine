services:
  postgres:
    image: postgres:15-alpine
    container_name: prayaan-postgres
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prayaan-redis
    ports:
      - "6379:6379"

  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: prayaan-temporal
    environment:
      - DB=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: prayaan-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama

  api:
    build: .
    container_name: prayaan-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      temporal:
        condition: service_started
    develop:
      watch:
        - path: ./app
          action: sync
          target: /code/app
        - path: ./requirements.txt
          action: rebuild

  worker:
    build: .
    container_name: prayaan-worker
    command: python worker/policy_workflow.py
    env_file: .env
    depends_on:
      api:
        condition: service_started
      ollama:
        condition: service_started
    develop:
      watch:
        - path: ./worker
          action: sync+restart
          target: /code/worker
        - path: ./app
          action: sync+restart
          target: /code/app
        - path: ./requirements.txt
          action: rebuild

volumes:
  postgres_data:
  ollama_data: